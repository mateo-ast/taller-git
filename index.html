<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semana de la Ingeniería - UNViMe</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <script src="js/clock.js" defer></script>
  <script src="js/weather.js" defer></script>
</head>

<body>
  <header>
    <div id="weather-container">
      <span id="weather-icon">⏳</span>
      <span id="weather-temp">Cargando...</span>
    </div>
    <div id="cabecera"></div>
    <div id="clock-container">
      <span id="live-clock">--:--:--</span>
    </div>
  </header>

  <main>
    <div class="tabs-container">
      <input type="radio" name="program-tabs" id="tab-lunes" checked>
      <input type="radio" name="program-tabs" id="tab-martes">

      <div class="tab-nav">
        <label for="tab-lunes" class="tab-label">Lunes 8 de Junio</label>
        <label for="tab-martes" class="tab-label">Martes 9 de Junio</label>
      </div>

      <div class="tab-content-wrapper">
        <section id="content-lunes" class="tab-content"></section>
        <section id="content-martes" class="tab-content"></section>
      </div>
    </div>
  </main>
</body>

</html>
